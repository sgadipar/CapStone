<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureBank — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #6366f1;
      --primary-hover: #4f46e5;
      --secondary:     #ec4899;
      --bg:            #0f172a;
      --card-bg:       rgba(30, 41, 59, 0.75);
      --border:        rgba(255, 255, 255, 0.1);
      --text:          #f8fafc;
      --muted:         #94a3b8;
      --danger:        #ef4444;
      --danger-bg:     rgba(239, 68, 68, 0.12);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #020617 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      margin-bottom: 24px;
    }

    .alert {
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-left: 4px solid var(--danger);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #fca5a5;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
    }

    input[type="text"],
    input[type="password"] {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      font-size: 0.95rem;
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    input::placeholder { color: #475569; }

    .btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: #fff;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    }

    .btn:active { transform: translateY(0); }

    .hint {
      margin-top: 24px;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .hint strong { color: var(--text); font-weight: 600; }

    code {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.8em;
      background: rgba(255,255,255,0.07);
      padding: 1px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Demo Environment</div>
    <div class="brand">🏦 SecureBank</div>
    <p class="subtitle">Sign in to continue to the banking app</p>

    <div th:if="${param.error}" class="alert">
      Incorrect username or password. Please try again.
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text"
               placeholder="alice or admin" autocomplete="username" autofocus/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               placeholder="same as username" autocomplete="current-password"/>
      </div>

      <button class="btn" type="submit">Sign in</button>
    </form>

    <div class="hint">
      <strong>Demo accounts</strong><br/>
      Customer: <code>alice</code> / <code>alice</code><br/>
      Admin:&nbsp;&nbsp;&nbsp;<code>admin</code> / <code>admin</code>
    </div>
  </div>
</body>
</html>
