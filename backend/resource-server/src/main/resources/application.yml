server:
  port: 8081

spring:
  application:
    name: banking-resource-server

  # ---- OAuth2 Resource Server (JWT) ----
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVER_URL:http://localhost:9000}

  # ---- Oracle Database ----
  # ORACLE_URL examples:
  #   Docker Oracle XE:      jdbc:oracle:thin:@//localhost:1521/XEPDB1
  #   Standalone Oracle XE:  jdbc:oracle:thin:@//localhost:1522/XEPDB1
  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
    username: bankapp
    password: bankapp_password
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false   # V2 seed was edited after first run; skip checksum check in dev

  # ---- Kafka ----
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >-
          transactionEvent:com.example.banking.kafka.TransactionEvent


# ---- Payment Processor (WireMock) ----
bank:
  payment-processor:
    base-url: ${PAYMENT_PROCESSOR_URL:http://localhost:8089}
    api-key: ${PAYMENT_PROCESSOR_API_KEY:test-api-key}
    connect-timeout-ms: 5000
    read-timeout-ms: 5000
  kafka:
    transactions-topic: banking.transactions

logging:
  level:
    com.example.banking: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
